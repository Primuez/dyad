version: '3.8'

services:
  webtop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: dyad_webtop
    security_opt:
      - seccomp:unconfined # Critical: Allows Electron apps to run inside Docker
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - dyad_data:/config
    ports:
      - "3009:3000" # Access the virtual desktop via http://your-vps-ip:3009
    shm_size: "2gb" # Prevents the UI from crashing out of memory
    restart: unless-stopped

volumes:
  dyad_data:
